<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mxbai layer explorer</title>
<style>
 :root{color-scheme:dark}
 *{box-sizing:border-box}
 body{margin:0;background:#0a0d14;color:#dbe4f0;font:14px/1.55 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif}
 .wrap{padding:6px 4px 12px}
 .card{background:#0e131d;border:1px solid #1c2636;border-radius:12px;padding:16px}
 .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
 .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
 @media(max-width:640px){.grid{grid-template-columns:1fr}}
 select{background:#15202f;color:#cfe0f5;border:1px solid #26344a;border-radius:7px;padding:5px 9px;font:inherit}
 canvas{display:block;width:100%;background:#080b11;border-radius:10px}
 .muted{color:#8a99b0;font-size:12.5px}
 .panel-title{font-size:12px;color:#9fb2cc;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
 .met{display:flex;align-items:center;gap:10px;margin:8px 0 2px}
 .met .lbl{width:120px;color:#aebed4;font-size:12.5px}
 .met .bar{flex:1;height:11px;background:#16202e;border-radius:6px;overflow:hidden}
 .met .bar i{display:block;height:100%;border-radius:6px}
 .met .val{width:44px;text-align:right;font-variant-numeric:tabular-nums;color:#fff}
 .legend{font-size:12px;color:#9fb2cc;display:flex;gap:14px;margin-top:6px}
 .sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin-right:5px}
 .cap{margin-top:10px;padding:10px 12px;background:#0c1828;border:1px solid #16314e;border-radius:8px;color:#bfe0ff;font-size:13px}
</style></head>
<body><div class="wrap"><div class="card">
  <div class="row" style="margin-bottom:8px">
    <span class="muted">stage:</span>
    <select id="layerSel"></select>
    <span class="muted" style="margin-left:auto" id="layerBest"></span>
  </div>
  <div class="grid">
    <div>
      <div class="panel-title">real (blue) vs best synthetic (green) — UMAP on real</div>
      <canvas id="layerCanvas" height="300"></canvas>
      <div class="legend"><span><span class="sw" style="background:#3b82f6"></span>real</span><span><span class="sw" style="background:#22c55e"></span>synthetic estimate</span></div>
    </div>
    <div>
      <div class="panel-title">shape fidelity (c2st → ceiling)</div>
      <div id="layerBars"></div>
      <div class="panel-title" style="margin-top:14px">this stage's shape</div>
      <div id="layerMetrics" class="muted" style="font-variant-numeric:tabular-nums"></div>
      <div class="cap" id="layerCap"></div>
    </div>
  </div>
</div></div>
<script>
const $=s=>document.getElementById(s);
let LV=null, lvKey=null;
function drawLayer(){
  const L=LV.layers[lvKey];
  const cv=$('layerCanvas'),W=cv.clientWidth;cv.width=W;const H=300,x=cv.getContext('2d'),pad=14;x.clearRect(0,0,W,H);
  const mx=v=>pad+((v+1)/2)*(W-2*pad), my=v=>pad+((1-(v+1)/2))*(H-2*pad);
  const dot=(pts,col,a)=>{x.fillStyle=col;x.globalAlpha=a;for(const[u,v]of pts){x.beginPath();x.arc(mx(u),my(v),2.0,0,7);x.fill()}x.globalAlpha=1};
  dot(L.real,'#3b82f6',.5); dot(L.synth,'#22c55e',.5);
  const ceil=L.ceiling[0], sc=L.scores; let h='';
  Object.keys(sc).filter(c=>c!=='_ceiling').forEach(c=>{const v=sc[c][0];
    const col=(c===L.best_config)?'#22c55e':(c==='flat GMM'?'#e0683b':'#c98a5b');
    h+=`<div class="met"><div class="lbl">${c}</div><div class="bar"><i style="width:${Math.min(100,v/0.55*100).toFixed(0)}%;background:${col}"></i></div><div class="val">${v.toFixed(2)}</div></div>`});
  h+=`<div class="muted" style="margin-top:6px">▸ ceiling (real vs real) = <b style="color:#7fe0a8">${ceil.toFixed(2)}</b> · best: <b>${L.best_config}</b> → <b>${L.c2st_best[0].toFixed(2)}</b></div>`;
  $('layerBars').innerHTML=h;
  const m=L.metrics;
  $('layerMetrics').innerHTML=`intrinsic dim <b>${m.intrinsic_dim}</b> · IsoScore <b>${m.isoscore}</b> · participation ratio <b>${m.participation_ratio}</b> · anisotropy <b>${m.anisotropy}</b> · nn-cosine <b>${m.nn_cos_mean}</b>`;
  $('layerCap').textContent=L.caption||'';
  $('layerBest').textContent=`${L.n.toLocaleString()} points · ${Math.round(L.unique_frac*100)}% distinct`;
}
(async()=>{
  LV=await(await fetch('./data/layer_viz.json?ts='+Date.now(),{cache:'no-store'})).json();
  const sel=$('layerSel');sel.innerHTML='';
  LV.order.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=LV.layers[k].label;sel.appendChild(o)});
  lvKey=LV.order[0];sel.value=lvKey;sel.onchange=()=>{lvKey=sel.value;drawLayer()};
  drawLayer();
  window.addEventListener('resize',drawLayer);
  function s(){try{parent.postMessage({type:'ifh',height:document.documentElement.scrollHeight},'*')}catch(e){}}
  window.addEventListener('load',s);if(window.ResizeObserver)new ResizeObserver(s).observe(document.body);setInterval(s,1200);
})();
</script>
</body></html>
